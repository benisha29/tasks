<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple-Addition-Using-JavaScript</title>
</head>
<body>
    <div>
    <h1>Adding Result</h1>
    <p id="result"></p>
    <script>
        let a = 5, b = 10;
        let sum = a + b;
        document.getElementById("result").innerHTML = `The sum of ${a} and ${b} is ${sum}`;
    </script>
    </div>
</body>
</html>
