<!-- createElement, textContent and setAttribute-->
  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Fundamentals</title>
  </head>
  <body>
    <button onClick="handleClick()">Click me</button>
    <input type="text" id="myInput" placeholder="write your name here" onClick="handleClick2()"/>
    <script>
        let newElement = document.createElement('div');
        newElement.textContent = "this is a new element";

        function handleClick() {
            document.body.appendChild(newElement);
        }

        function handleClick2() {
            document.getElementById('myInput').setAttribute('placeholder', ' ');
        }
    </script>
  </body>
  </html>
